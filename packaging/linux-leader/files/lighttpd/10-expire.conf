# Cache-control for SPA + assets
# http://redmine.lighttpd.net/projects/lighttpd/wiki/Docs:ModExpire

server.modules += ( "mod_expire" )

$HTTP["url"] =~ "^/static/" {
    # Long cache for hashed assets under /static/static/*
    expire.url = ( "" => "access 12 hours" )
}

# Ensure fast updates for SPA shell and service worker
$HTTP["url"] == "/static/index.html" {
    expire.url = ( "" => "access 0 seconds" )
}
$HTTP["url"] == "/static/service-worker.js" {
    expire.url = ( "" => "access 0 seconds" )
}
$HTTP["url"] == "/static/asset-manifest.json" {
    expire.url = ( "" => "access 0 seconds" )
}
