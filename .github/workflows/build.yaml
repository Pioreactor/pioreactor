name: Build
on:
  release:
    types: [published]

jobs:
  build:
    name: 🔨 Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 🏗 Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: 🏗 Install build dependencies
        run: |
          python -m pip install -U wheel build setuptools --user
      - name: 🔨 Build a binary wheel and a source tarball
        working-directory: core
        run: |
          python -m build --wheel
      - name: ⬆ Upload build result
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: core/dist
      - name: ➕ Upload wheel to GH release page
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'release' && github.repository == 'Pioreactor/pioreactor'
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: core/dist/*.whl
          tag: ${{ github.event.release.tag_name }}
          overwrite: true
          file_glob: true
      - name: ➕ Upload CHANGELOG to GH release page
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'release' && github.repository == 'Pioreactor/pioreactor'
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: CHANGELOG.md
          tag: ${{ github.event.release.tag_name }}
          overwrite: true
          file_glob: true

  build-deps:
    name: 🔨 Build dependencies and upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 🏗 Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
      - name: 🏗 Install dependencies
        run: |
          python -m pip install --upgrade pip
      - name: 🔨 Download wheels for all dependencies
        run: |
          pip download -d wheels \
            --find-links wheels \
            -r requirements/requirements_leader_worker.txt \
            --index-url https://piwheels.org/simple \
            --platform linux_armv7l \
            --platform linux_armv6l \
            --platform manylinux_2_36_armv7l \
            --only-binary=:all: \
            --extra-index-url https://pypi.org/simple \
            --python-version 313

          pip download -d wheels \
            --find-links wheels \
            -r requirements/requirements_leader_worker.txt \
            --index-url https://piwheels.org/simple \
            --platform linux_aarch64 \
            --platform manylinux_2_17_aarch64 \
            --platform manylinux2014_aarch64 \
            --only-binary=:all: \
            --extra-index-url https://pypi.org/simple \
            --python-version 313

          # Add build tools so any future sdist won’t choke offline
          pip download -d wheels setuptools wheel \
            --index-url https://piwheels.org/simple \
            --extra-index-url https://pypi.org/simple
      - name: Zip the wheels
        run: |
          cd wheels
          zip -r ../wheels_${{ github.event.release.tag_name }}.zip .
      - name: Upload zipped wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-zip
          path: wheels_${{ github.event.release.tag_name }}.zip
      - name: Upload zipped wheels
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: wheels_${{ github.event.release.tag_name }}.zip
          tag: ${{ github.event.release.tag_name }}
          overwrite: true

  zip-asset-upload:
    name: 🤐 Zip assets and upload
    runs-on: ubuntu-latest
    needs: [build, build-deps]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Download wheels zip artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-zip
          path: .
      - name: Assemble release archive from repo and artifacts
        run: |
          tag="${{ github.event.release.tag_name }}"
          update_dir="core/update_scripts/$tag"
          required_update_files="pre_update.sh update.sh post_update.sh update.sql"

          test -d "$update_dir" || {
            echo "Missing update scripts directory: $update_dir" >&2
            exit 1
          }

          mkdir release_assets
          cp CHANGELOG.md release_assets/
          cp "dist/pioreactor-$tag-py3-none-any.whl" release_assets/
          cp "wheels_${tag}.zip" "release_assets/wheels_${tag}.zip"
          cp "$update_dir"/* release_assets/

          for filename in $required_update_files; do
            [ -f "release_assets/$filename" ] || : > "release_assets/$filename"
          done

          cd release_assets
          zip -r ../release_${{ github.event.release.tag_name }}.zip .
      - name: Upload zipped assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: release_${{ github.event.release.tag_name }}.zip
          tag: ${{ github.event.release.tag_name }}
          overwrite: true


  publish-on-pypi:
    name: 📦 Publish tagged releases to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: ⬇ Download build result
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: 📦 Publish to index
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PIOREACTOR_PYPI_API_TOKEN }}

  notify-custopizer-build:
    name: 📧 Notify Pioreactor/CustoPizer
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: 👀 Validate release tag
        run: |
          test -n "${{ github.event.release.tag_name }}" || {
            echo "github.event.release.tag_name is empty; refusing to notify CustoPizer." >&2
            exit 1
          }
      - name: 🚀 Repository Dispatch
        if: ${{ github.event.release.tag_name != '' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REPODISPATCH_TOKEN }}
          repository: Pioreactor/CustoPizer
          event-type: pioreactor_release
          client-payload: '{"version": "${{ github.event.release.tag_name }}"}'
