# Create ephemeral runtime directories for Pioreactor
# d <path> <mode> <user> <group> <age> <argument>

# Base runtime dir for sockets/cache/exports. Must be writable by lighttpd (www-data)
# so it can create FastCGI socket files. Use 2775 to ensure group-writability and
# group inheritance on new files/dirs.
d /run/pioreactor 2775 pioreactor www-data - -
d /run/pioreactor/exports 2775 pioreactor www-data - -
d /run/pioreactor/cache 2770 pioreactor www-data - -
f /run/pioreactor/cache/local_intermittent_pioreactor_metadata.sqlite 0660 pioreactor www-data - -
f /run/pioreactor/cache/huey.db 0660 pioreactor www-data - -
