# Pioreactor web API and SPA config

# Rewrites
url.rewrite-once = (
  "^(/static($|/.*))$"   => "$1",
  # API to FastCGI
  "^(/api/.*)$"          => "/api.fcgi$1",
  "^(/unit_api/.*)$"     => "/api.fcgi$1",
  "^(/mcp/.*)$"          => "/api.fcgi$1",
)

# Static aliases
alias.url += ( "/static/"  => "/usr/share/pioreactorui/static/" )
alias.url += ( "/exports/" => "/run/pioreactor/exports/" )

# SPA fallback for non-API URLs
$HTTP["url"] !~ "^(/api($|/)|/api\.fcgi($|/)|/unit_api($|/)|/mcp($|/)|/static($|/)|/exports($|/))" {
  url.rewrite-if-not-file = ( "^(.*)$" => "/static/index.html" )
}

# FastCGI app
fastcgi.server += ("/api.fcgi" =>
  ((
    "socket"      => "/run/pioreactor/pioreactor_web.sock",
    "bin-path"    => "/opt/pioreactor/venv/bin/pioreactor-fcgi",
    "check-local" => "disable",
    "max-procs"   => 1,
    "fix-root-scriptname" => "enable",
  ))
)
