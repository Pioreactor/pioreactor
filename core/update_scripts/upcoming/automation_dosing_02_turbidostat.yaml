---
display_name: Turbidostat
automation_name: turbidostat
description: >
  When the selected biomass signal updates above the target value, exchange volume amount.

fields:
  - key: target_biomass
    default: null
    unit: OD/AU
    label: Target
    type: numeric
    required: true
  - key: biomass_signal
    default: auto
    label: Biomass signal
    type: select
    options:
      - auto
      - od_fused
      - od
      - normalized_od
  - key: exchange_volume_ml
    default: null
    unit: mL
    label: Exchange volume
    type: numeric
    required: true
